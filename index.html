<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 강아지 vs 고양이</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 동물상 테스트</h1>
            <p class="subtitle">나는 강아지상일까, 고양이상일까?</p>
        </header>

        <main>
            <div class="mode-switch">
                <button id="btn-mode-upload" class="btn-mode active">사진 업로드</button>
                <button id="btn-mode-webcam" class="btn-mode">실시간 카메라</button>
            </div>

            <div id="upload-area" class="upload-section">
                <div class="upload-icon">📸</div>
                <p>얼굴 사진을 업로드하거나 드래그하세요</p>
                <input type="file" id="image-upload" accept="image/*" hidden>
                <button class="btn-upload" onclick="document.getElementById('image-upload').click()">사진 선택하기</button>
            </div>

            <div id="webcam-area" style="display: none;">
                <div id="webcam-container"></div>
                <p class="webcam-hint">카메라를 정면으로 바라봐주세요</p>
            </div>

            <div id="image-preview-container" style="display: none;">
                <img id="image-preview" src="#" alt="미리보기">
            </div>

            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 분석 중입니다...</p>
            </div>

            <div id="result-container" style="display: none;">
                <h2 id="result-title">당신은 강아지상입니다!</h2>
                <div class="result-bar-container">
                    <div class="result-label">강아지</div>
                    <div class="progress-bar">
                        <div id="dog-bar" class="progress-fill dog-color" style="width: 0%;"></div>
                    </div>
                    <div id="dog-percent" class="result-percent">0%</div>
                </div>
                <div class="result-bar-container">
                    <div class="result-label">고양이</div>
                    <div class="progress-bar">
                        <div id="cat-bar" class="progress-fill cat-color" style="width: 0%;"></div>
                    </div>
                    <div id="cat-percent" class="result-percent">0%</div>
                </div>
                <button class="btn-retry" onclick="location.reload()">다시 하기</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 AI Animal Face Test. Powered by Teachable Machine</p>
        </footer>
    </div>

    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
