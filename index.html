<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숏폼 메이커 - 동영상을 숏폼으로</title>
    <link rel="stylesheet" href="style.css">
    <!-- COI Service Worker for SharedArrayBuffer support on GitHub Pages -->
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
</head>
<body>
    <header>
        <h1>숏폼 메이커</h1>
    </header>
    <main>
        <section class="upload-section">
            <h2>동영상을 업로드하세요</h2>
            <p>동영상을 업로드하면 자동으로 9:16 숏폼 비율로 편집해 드립니다.</p>
            <div class="upload-container">
                <input type="file" id="video-upload" accept="video/*">
                <label for="video-upload" class="upload-button">파일 선택</label>
            </div>
            <div id="status" class="status-container" style="display: none;">
                <div class="loader"></div>
                <p id="status-text">FFmpeg 로딩 중...</p>
                <progress id="progress" value="0" max="100" style="display: none;"></progress>
            </div>
        </section>
        <section class="gallery-section">
            <h2>편집된 숏폼</h2>
            <div id="video-gallery" class="video-gallery">
                <!-- 숏폼 비디오가 여기에 표시됩니다. -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 숏폼 메이커. All rights reserved.</p>
    </footer>
    <!-- FFmpeg.wasm -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
