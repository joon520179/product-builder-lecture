
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀵콘 - 동영상을 숏폼으로</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>퀵콘</h1>
    </header>
    <main>
        <section class="upload-section">
            <h2>동영상을 업로드하세요</h2>
            <p>동영상을 업로드하면 숏폼 콘텐츠로 만들어 드립니다.</p>
            <div class="upload-container">
                <input type="file" id="video-upload" accept="video/*">
                <label for="video-upload" class="upload-button">파일 선택</label>
            </div>
        </section>
        <section class="gallery-section">
            <h2>숏폼 갤러리</h2>
            <div class="video-gallery">
                <!-- 숏폼 비디오가 여기에 표시됩니다. -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 퀵콘. All rights reserved.</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
